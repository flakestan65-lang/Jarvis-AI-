<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S.</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --jarvis-blue: #00d4ff;
            --jarvis-blue-dim: rgba(0, 212, 255, 0.15);
            --jarvis-blue-glow: rgba(0, 212, 255, 0.4);
            --bg-dark: #0a0e14;
            --bg-panel: rgba(10, 14, 20, 0.85);
            --text-primary: #e0f0ff;
            --text-secondary: #8a9bb0;
            --border-glow: rgba(0, 212, 255, 0.3);
            --error-red: #ff3b30;
            --success-green: #30d158;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--jarvis-blue);
            border-radius: 50%;
            opacity: 0;
            animation: float 8s infinite;
        }

        @keyframes float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 0 16px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-glow);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .jarvis-icon {
            width: 44px;
            height: 44px;
            border: 2px solid var(--jarvis-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse-ring 3s infinite;
        }

        .jarvis-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--jarvis-blue);
            animation: ripple 3s infinite;
        }

        .jarvis-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--jarvis-blue);
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 10px var(--jarvis-blue-glow); }
            50% { box-shadow: 0 0 25px var(--jarvis-blue-glow), 0 0 50px rgba(0, 212, 255, 0.1); }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .title-group h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--jarvis-blue);
            letter-spacing: 3px;
            text-shadow: 0 0 20px var(--jarvis-blue-glow);
        }

        .title-group .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-green);
            box-shadow: 0 0 8px var(--success-green);
            animation: blink 2s infinite;
        }

        .status-dot.offline {
            background: var(--error-red);
            box-shadow: 0 0 8px var(--error-red);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--jarvis-blue-dim);
            border-radius: 2px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: messageIn 0.3s ease-out;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.jarvis {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .message.jarvis .avatar {
            background: var(--jarvis-blue-dim);
            border: 1px solid var(--jarvis-blue);
            color: var(--jarvis-blue);
            box-shadow: 0 0 15px var(--jarvis-blue-glow);
        }

        .message.user .avatar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.jarvis .message-content {
            background: var(--jarvis-blue-dim);
            border: 1px solid var(--border-glow);
            border-top-left-radius: 4px;
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top-right-radius: 4px;
            color: var(--text-primary);
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .message-content code {
            background: rgba(0, 212, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: var(--jarvis-blue);
        }

        .message-content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
        }

        .thinking-dot {
            width: 6px;
            height: 6px;
            background: var(--jarvis-blue);
            border-radius: 50%;
            animation: thinking 1.4s infinite ease-in-out both;
        }

        .thinking-dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes thinking {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .input-container {
            padding: 16px 0 24px;
            border-top: 1px solid var(--border-glow);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 8px 8px 8px 20px;
            backdrop-filter: blur(10px);
            transition: box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            box-shadow: 0 0 20px var(--jarvis-blue-glow);
            border-color: var(--jarvis-blue);
        }

        .input-field {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            min-height: 24px;
            padding: 8px 0;
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--jarvis-blue);
            color: var(--bg-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: #33ddff;
            box-shadow: 0 0 20px var(--jarvis-blue-glow);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            gap: 24px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            border: 2px solid var(--jarvis-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-ring 3s infinite;
        }

        .welcome-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--jarvis-blue);
        }

        .welcome-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--jarvis-blue);
            text-shadow: 0 0 30px var(--jarvis-blue-glow);
        }

        .welcome-text {
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.6;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }

        .quick-btn {
            background: var(--jarvis-blue-dim);
            border: 1px solid var(--border-glow);
            color: var(--jarvis-blue);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: var(--jarvis-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--jarvis-blue-glow);
        }

        .error-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 59, 48, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .error-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            .title-group h1 { font-size: 1.1rem; }
            .message { max-width: 92%; }
            .app-container { padding: 0 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <div class="header">
            <div class="logo-section">
                <div class="jarvis-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="title-group">
                    <h1>J.A.R.V.I.S.</h1>
                    <div class="subtitle">Just A Rather Very Intelligent System</div>
                </div>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Онлайн</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <div class="welcome-title">Добро пожаловать, сэр</div>
                <div class="welcome-text">
                    Я J.A.R.V.I.S. — ваш персональный ИИ-ассистент.
                    Готов помочь с любыми задачами: от написания кода до анализа данных.
                </div>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="sendQuick('Напиши код на Python для парсинга веб-страницы')">🐍 Python код</button>
                    <button class="quick-btn" onclick="sendQuick('Объясни квантовую механику простыми словами')">🔬 Объясни</button>
                    <button class="quick-btn" onclick="sendQuick('Сгенерируй идею для стартапа в сфере ИИ')">💡 Идея</button>
                    <button class="quick-btn" onclick="sendQuick('Переведи на английский: Привет, мир!')">🌐 Перевод</button>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea
                    class="input-field"
                    id="userInput"
                    placeholder="Введите сообщение..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <script>
        const API_KEY = 'csk-49rckn4yd6jk23xtrk6fhhpmvcm3y9prytm3d2h244nnxp5m';
        const API_URL = 'https://api.cerebras.ai/v1/chat/completions';
        const MODEL = 'llama3.1-8b';

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const errorToast = document.getElementById('errorToast');

        let isProcessing = false;
        let messages = [
            { role: 'system', content: 'You are J.A.R.V.I.S., a highly intelligent AI assistant inspired by Iron Man\'s Jarvis. You are polite, helpful, and speak with a touch of sophistication. You address the user respectfully. Respond in the same language the user uses.' }
        ];

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (6 + Math.random() * 6) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendQuick(text) {
            userInput.value = text;
            sendMessage();
        }

        function showError(message) {
            errorToast.textContent = message;
            errorToast.classList.add('show');
            setTimeout(() => errorToast.classList.remove('show'), 4000);
        }

        function addMessage(role, content) {
            if (welcomeScreen) {
                welcomeScreen.style.display = 'none';
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'jarvis' ? 'J' : 'ВЫ';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatContent(content);

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return contentDiv;
        }

        function formatContent(text) {
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            text = text.replace(/```(\\w*)\\n([\\s\\S]*?)```/g, '<pre><code>$2</code></pre>');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            text = text.replace(/\\*\\*([^*]+)\\*\\*/g, '<strong>$1</strong>');
            text = text.replace(/\\*([^*]+)\\*/g, '<em>$1</em>');
            text = text.replace(/\\n/g, '<br>');
            return text;
        }

        function showThinking() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message jarvis';
            msgDiv.id = 'thinkingMsg';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = 'J';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content thinking';
            contentDiv.innerHTML = '<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>';

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return msgDiv;
        }

        function removeThinking() {
            const thinking = document.getElementById('thinkingMsg');
            if (thinking) thinking.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isProcessing) return;

            if (API_KEY === 'YOUR_API_KEY_HERE' || !API_KEY) {
                showError('⚠️ Вставь свой Cerebras API Key в код (переменная API_KEY)');
                return;
            }

            addMessage('user', text);
            messages.push({ role: 'user', content: text });

            userInput.value = '';
            userInput.style.height = 'auto';
            isProcessing = true;
            sendBtn.disabled = true;
            statusDot.classList.add('offline');
            statusText.textContent = 'Думает...';

            const thinkingEl = showThinking();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        temperature: 0.7,
                        max_completion_tokens: 2048,
                        stream: false
                    })
                });

                removeThinking();

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                messages.push({ role: 'assistant', content: assistantMessage });
                addMessage('jarvis', assistantMessage);

            } catch (error) {
                removeThinking();
                console.error('Error:', error);
                showError('❌ Ошибка: ' + error.message);
                addMessage('jarvis', 'Прошу прощения, сэр. Произошла ошибка связи. Проверьте API Key и подключение к интернету.');
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                statusDot.classList.remove('offline');
                statusText.textContent = 'Онлайн';
                userInput.focus();
            }
        }

        userInput.focus();
    </script>
</body>
</html>
