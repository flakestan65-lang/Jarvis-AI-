<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Сапёр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        
        .game-container {
            background: #c0c0c0;
            border: 3px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 6px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            margin-bottom: 6px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #808080 #fff #fff #808080;
            flex-shrink: 0;
        }
        
        .counter, .timer {
            background: #000;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            padding: 2px 6px;
            min-width: 54px;
            text-align: center;
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        
        .face-btn {
            width: 36px;
            height: 36px;
            font-size: 22px;
            background: #c0c0c0;
            border: 3px solid;
            border-color: #fff #808080 #808080 #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            flex-shrink: 0;
        }
        
        .face-btn:active {
            border-color: #808080 #fff #fff #808080;
        }
        
        .face-btn.pressed {
            border-color: #808080 #fff #fff #808080;
            background: #b0b0b0;
        }
        
        .grid-wrapper {
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(16, 1fr);
            border: 3px solid;
            border-color: #808080 #fff #fff #808080;
            background: #c0c0c0;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
        }
        
        .cell {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            min-width: 0;
            min-height: 0;
            line-height: 1;
        }
        
        .cell.revealed {
            border: 1px solid #b0b0b0;
            background: #c0c0c0;
            cursor: default;
        }
        
        .cell.flagged {
            color: #ff0000;
        }
        
        .cell.mine {
            background: #ff0000;
            color: #000;
        }
        
        .cell.mine-hit {
            background: #ff0000;
            color: #000;
        }
        
        .cell .flag-icon {
            color: #ff0000;
            font-size: 16px;
            line-height: 1;
        }
        
        .cell .mine-icon {
            font-size: 16px;
            line-height: 1;
        }
        
        .cell[data-number="1"] { color: #0000ff; }
        .cell[data-number="2"] { color: #008000; }
        .cell[data-number="3"] { color: #ff0000; }
        .cell[data-number="4"] { color: #000080; }
        .cell[data-number="5"] { color: #800000; }
        .cell[data-number="6"] { color: #008080; }
        .cell[data-number="7"] { color: #000; }
        .cell[data-number="8"] { color: #808080; }
        
        .cell.revealed[data-number="0"] {
            background: #c0c0c0;
            border: 1px solid #b0b0b0;
        }
        
        .cell.wrong-flag {
            background: #ff0000;
        }
        
        .cell.wrong-flag .flag-icon {
            color: #000;
            text-decoration: line-through;
        }
        
        @media (max-width: 420px) {
            .game-container {
                padding: 3px;
                width: 100vw;
                height: 100vh;
                justify-content: center;
            }
            .grid-container {
                max-width: 100%;
                width: 100%;
            }
            .cell {
                font-size: 12px;
            }
            .counter, .timer {
                font-size: 18px;
                min-width: 44px;
            }
            .face-btn {
                width: 32px;
                height: 32px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="counter" id="mine-counter">040</div>
            <button class="face-btn" id="face-btn" onclick="newGame()">🙂</button>
            <div class="timer" id="timer">000</div>
        </div>
        <div class="grid-wrapper">
            <div class="grid-container" id="grid"></div>
        </div>
    </div>

    <script>
        const ROWS = 16;
        const COLS = 16;
        const MINES = 40;
        
        let board = [];
        let revealed = [];
        let flagged = [];
        let gameOver = false;
        let firstClick = true;
        let timerInterval = null;
        let seconds = 0;
        let minesLeft = MINES;
        let longPressTimer = null;
        let isLongPress = false;
        
        const grid = document.getElementById('grid');
        const mineCounter = document.getElementById('mine-counter');
        const timerDisplay = document.getElementById('timer');
        const faceBtn = document.getElementById('face-btn');
        
        function initBoard() {
            board = [];
            revealed = [];
            flagged = [];
            gameOver = false;
            firstClick = true;
            seconds = 0;
            minesLeft = MINES;
            
            clearInterval(timerInterval);
            timerInterval = null;
            
            updateMineCounter();
            updateTimer();
            faceBtn.textContent = '🙂';
            faceBtn.classList.remove('pressed');
            
            grid.innerHTML = '';
            
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                revealed[r] = [];
                flagged[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = 0;
                    revealed[r][c] = false;
                    flagged[r][c] = false;
                    
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('mousedown', handleMouseDown);
                    cell.addEventListener('mouseup', handleMouseUp);
                    cell.addEventListener('contextmenu', (e) => e.preventDefault());
                    
                    cell.addEventListener('touchstart', handleTouchStart, { passive: false });
                    cell.addEventListener('touchend', handleTouchEnd, { passive: false });
                    cell.addEventListener('touchmove', handleTouchMove, { passive: false });
                    
                    grid.appendChild(cell);
                }
            }
        }
        
        function placeMines(firstR, firstC) {
            let minesPlaced = 0;
            const safeCells = new Set();
            
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = firstR + dr;
                    const nc = firstC + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                        safeCells.add(nr + ',' + nc);
                    }
                }
            }
            
            while (minesPlaced < MINES) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                
                if (safeCells.has(r + ',' + c)) continue;
                if (board[r][c] === -1) continue;
                
                board[r][c] = -1;
                minesPlaced++;
                
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] !== -1) {
                            board[nr][nc]++;
                        }
                    }
                }
            }
        }
        
        function getCell(r, c) {
            return grid.children[r * COLS + c];
        }
        
        function revealCell(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
            if (revealed[r][c] || flagged[r][c]) return;
            
            revealed[r][c] = true;
            const cell = getCell(r, c);
            cell.classList.add('revealed');
            
            if (board[r][c] === -1) {
                cell.classList.add('mine-hit');
                cell.innerHTML = '<span class="mine-icon">💣</span>';
                return;
            }
            
            if (board[r][c] > 0) {
                cell.textContent = board[r][c];
                cell.dataset.number = board[r][c];
            } else {
                cell.dataset.number = '0';
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        revealCell(r + dr, c + dc);
                    }
                }
            }
        }
        
        function toggleFlag(r, c) {
            if (revealed[r][c] || gameOver) return;
            
            const cell = getCell(r, c);
            
            if (flagged[r][c]) {
                flagged[r][c] = false;
                cell.classList.remove('flagged');
                cell.innerHTML = '';
                minesLeft++;
            } else {
                flagged[r][c] = true;
                cell.classList.add('flagged');
                cell.innerHTML = '<span class="flag-icon">🚩</span>';
                minesLeft--;
            }
            
            updateMineCounter();
        }
        
        function handleMouseDown(e) {
            if (gameOver) return;
            if (e.button === 0) {
                faceBtn.classList.add('pressed');
            }
        }
        
        function handleMouseUp(e) {
            faceBtn.classList.remove('pressed');
            if (gameOver) return;
            
            const cellEl = e.target.closest('.cell');
            if (!cellEl) return;
            const r = parseInt(cellEl.dataset.row);
            const c = parseInt(cellEl.dataset.col);
            
            if (e.button === 0) {
                if (flagged[r][c]) return;
                
                if (firstClick) {
                    firstClick = false;
                    placeMines(r, c);
                    startTimer();
                }
                
                if (board[r][c] === -1) {
                    gameLost();
                } else {
                    revealCell(r, c);
                    checkWin();
                }
            } else if (e.button === 2) {
                toggleFlag(r, c);
            }
        }
        
        function handleTouchStart(e) {
            if (gameOver) return;
            e.preventDefault();
            
            const cell = e.target.closest('.cell');
            if (!cell) return;
            
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);
            
            isLongPress = false;
            longPressTimer = setTimeout(() => {
                isLongPress = true;
                toggleFlag(r, c);
            }, 500);
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            
            clearTimeout(longPressTimer);
            
            if (isLongPress) return;
            
            const cell = e.target.closest('.cell');
            if (!cell) return;
            
            const r = parseInt(cell.dataset.row);
            const c = parseInt(cell.dataset.col);
            
            if (flagged[r][c]) return;
            
            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }
            
            if (board[r][c] === -1) {
                gameLost();
            } else {
                revealCell(r, c);
                checkWin();
            }
        }
        
        function handleTouchMove(e) {
            clearTimeout(longPressTimer);
            isLongPress = false;
        }
        
        function gameLost() {
            gameOver = true;
            clearInterval(timerInterval);
            faceBtn.textContent = '😵';
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = getCell(r, c);
                    
                    if (board[r][c] === -1) {
                        if (!flagged[r][c]) {
                            cell.classList.add('mine');
                            cell.innerHTML = '<span class="mine-icon">💣</span>';
                        }
                    } else if (flagged[r][c]) {
                        cell.classList.add('wrong-flag');
                    }
                }
            }
        }
        
        function checkWin() {
            let revealedCount = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (revealed[r][c]) revealedCount++;
                }
            }
            
            if (revealedCount === ROWS * COLS - MINES) {
                gameOver = true;
                clearInterval(timerInterval);
                faceBtn.textContent = '😎';
                
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (board[r][c] === -1 && !flagged[r][c]) {
                            const cell = getCell(r, c);
                            cell.classList.add('flagged');
                            cell.innerHTML = '<span class="flag-icon">🚩</span>';
                        }
                    }
                }
                
                minesLeft = 0;
                updateMineCounter();
            }
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                if (seconds > 999) seconds = 999;
                updateTimer();
            }, 1000);
        }
        
        function updateTimer() {
            timerDisplay.textContent = String(seconds).padStart(3, '0');
        }
        
        function updateMineCounter() {
            mineCounter.textContent = String(Math.max(0, minesLeft)).padStart(3, '0');
        }
        
        function newGame() {
            initBoard();
        }
        
        initBoard();
    </script>
</body>
</html>
