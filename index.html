<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 3px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #menu, #gameOver {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            border-radius: 8px;
        }
        #menu h1 {
            color: #e94560;
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        #menu p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .btn {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }
        .btn:hover {
            background: #ff6b81;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        #gameOver h2 {
            color: #e94560;
            font-size: 36px;
            margin-bottom: 10px;
        }
        #gameOver p {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .hidden { display: none !important; }
        #controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <div id="ui">
            <div>Счет: <span id="score">0</span>%</div>
            <div>Попыток: <span id="attempts">1</span></div>
        </div>
        <div id="menu">
            <h1>GEOMETRY DASH</h1>
            <p>Нажмите Пробел, ЛКМ или Тап для прыжка</p>
            <button class="btn" id="startBtn">ИГРАТЬ</button>
        </div>
        <div id="gameOver" class="hidden">
            <h2>ИГРА ОКОНЧЕНА</h2>
            <p>Счет: <span id="finalScore">0</span>%</p>
            <button class="btn" id="restartBtn">ПОВТОРИТЬ</button>
        </div>
        <div id="controls">Пробел / ЛКМ / Тап — Прыжок</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const gameOverScreen = document.getElementById('gameOver');
const scoreEl = document.getElementById('score');
const attemptsEl = document.getElementById('attempts');
const finalScoreEl = document.getElementById('finalScore');

// === ИГРОВЫЕ ПЕРЕМЕННЫЕ ===
let gameState = 'menu'; // menu, playing, gameover
let attempts = 1;
let cameraX = 0;
let levelLength = 0;

// === ИГРОК ===
const player = {
    x: 150,
    y: 0,
    width: 30,
    height: 30,
    vy: 0,
    gravity: 0.6,
    jumpForce: -11,
    grounded: false,
    rotation: 0,
    alive: true,
    trail: []
};

// === УРОВЕНЬ (препятствия) ===
// Формат: [x, y, type, ...params]
// type: 'floor' (y-уровень пола), 'spike', 'block', 'platform', 'orb'
let obstacles = [];
let floorY = 420;

function generateLevel() {
    obstacles = [];
    let x = 400;
    
    // Базовый пол
    obstacles.push(['floor', 0, floorY, 20000]);
    
    // Генерация препятствий
    const patterns = [
        // Простые шипы
        () => { obstacles.push(['spike', x, floorY - 30]); x += 60; },
        () => { obstacles.push(['spike', x, floorY - 30]); obstacles.push(['spike', x+30, floorY - 30]); x += 90; },
        () => { obstacles.push(['spike', x, floorY - 30]); obstacles.push(['spike', x+40, floorY - 30]); obstacles.push(['spike', x+80, floorY - 30]); x += 130; },
        // Блоки
        () => { obstacles.push(['block', x, floorY - 60, 60, 60]); x += 120; },
        () => { obstacles.push(['block', x, floorY - 60, 60, 60]); obstacles.push(['spike', x+70, floorY - 30]); x += 140; },
        // Платформы
        () => { obstacles.push(['platform', x, floorY - 100, 120]); x += 200; },
        () => { obstacles.push(['platform', x, floorY - 140, 100]); obstacles.push(['spike', x+130, floorY - 30]); x += 220; },
        // Блок + шип сверху
        () => { obstacles.push(['block', x, floorY - 60, 60, 60]); obstacles.push(['spike', x+10, floorY - 90]); x += 140; },
        // Двойная платформа
        () => { obstacles.push(['platform', x, floorY - 100, 80]); obstacles.push(['platform', x+120, floorY - 160, 80]); x += 260; },
        // Шипы на платформе
        () => { obstacles.push(['platform', x, floorY - 100, 150]); obstacles.push(['spike', x+30, floorY - 130]); obstacles.push(['spike', x+90, floorY - 130]); x += 240; },
        // Орб для прыжка
        () => { obstacles.push(['orb', x, floorY - 120]); obstacles.push(['spike', x+80, floorY - 30]); x += 160; },
        // Тройной блок
        () => { obstacles.push(['block', x, floorY - 60, 60, 60]); obstacles.push(['block', x, floorY - 120, 60, 60]); obstacles.push(['block', x+60, floorY - 60, 60, 60]); x += 180; },
        // Шип под платформой
        () => { obstacles.push(['platform', x, floorY - 140, 100]); obstacles.push(['spike', x+40, floorY - 30]); x += 200; },
        // Длинная платформа с шипами
        () => { obstacles.push(['platform', x, floorY - 120, 200]); obstacles.push(['spike', x+50, floorY - 150]); obstacles.push(['spike', x+150, floorY - 150]); x += 300; },
        // Блоки-лестница
        () => { obstacles.push(['block', x, floorY - 60, 50, 60]); obstacles.push(['block', x+50, floorY - 120, 50, 120]); obstacles.push(['block', x+100, floorY - 60, 50, 60]); x += 200; },
        // Орб + платформа
        () => { obstacles.push(['orb', x, floorY - 100]); obstacles.push(['platform', x+100, floorY - 160, 80]); x += 240; },
        // Шипы + прыжок
        () => { obstacles.push(['spike', x, floorY - 30]); obstacles.push(['spike', x+35, floorY - 30]); obstacles.push(['spike', x+70, floorY - 30]); obstacles.push(['spike', x+105, floorY - 30]); x += 180; },
        // Высокий блок
        () => { obstacles.push(['block', x, floorY - 120, 60, 120]); obstacles.push(['spike', x+80, floorY - 30]); x += 180; },
    ];
    
    // Генерируем 60 паттернов
    for (let i = 0; i < 60; i++) {
        const pattern = patterns[Math.floor(Math.random() * patterns.length)];
        pattern();
    }
    
    // Финиш
    x += 300;
    obstacles.push(['finish', x, floorY - 100]);
    levelLength = x + 500;
}

// === ЧАСТИЦЫ ===
let particles = [];
function spawnParticles(x, y, color, count = 5) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1,
            color,
            size: Math.random() * 4 + 2
        });
    }
}

// === ОБНОВЛЕНИЕ ===
let speed = 5;

function update() {
    if (gameState !== 'playing') return;
    
    // Гравитация
    player.vy += player.gravity;
    player.y += player.vy;
    
    // Вращение
    if (!player.grounded) {
        player.rotation += 8;
    } else {
        player.rotation = Math.round(player.rotation / 90) * 90;
    }
    
    // Коллизия с полом
    player.grounded = false;
    if (player.y + player.height >= floorY) {
        player.y = floorY - player.height;
        player.vy = 0;
        player.grounded = true;
    }
    
    // Коллизия с препятствиями
    for (let obs of obstacles) {
        const type = obs[0];
        const ox = obs[1] - cameraX;
        const oy = obs[2];
        
        if (type === 'block') {
            const ow = obs[3];
            const oh = obs[4];
            if (rectCollision(player.x, player.y, player.width, player.height, ox, oy, ow, oh)) {
                // Сверху
                if (player.vy > 0 && player.y + player.height - player.vy <= oy + 5) {
                    player.y = oy - player.height;
                    player.vy = 0;
                    player.grounded = true;
                } else {
                    die();
                }
            }
        } else if (type === 'platform') {
            const ow = obs[3];
            if (rectCollision(player.x, player.y, player.width, player.height, ox, oy, ow, 10)) {
                if (player.vy > 0 && player.y + player.height - player.vy <= oy + 10) {
                    player.y = oy - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }
        } else if (type === 'spike') {
            if (triangleCollision(player.x, player.y, player.width, player.height, ox, oy, 30, 30)) {
                die();
            }
        } else if (type === 'orb') {
            if (rectCollision(player.x, player.y, player.width, player.height, ox-15, oy-15, 30, 30)) {
                player.vy = player.jumpForce * 1.2;
                spawnParticles(ox, oy, '#00ff88', 8);
                // Удаляем орб
                obs[0] = 'collected_orb';
            }
        } else if (type === 'finish') {
            if (rectCollision(player.x, player.y, player.width, player.height, ox, oy, 40, 100)) {
                win();
            }
        }
    }
    
    // Камера
    cameraX += speed;
    if (cameraX > levelLength - canvas.width) cameraX = levelLength - canvas.width;
    
    // Счет
    const progress = Math.min(100, Math.floor((cameraX / (levelLength - canvas.width)) * 100));
    scoreEl.textContent = progress;
    
    // Частицы
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.03;
        p.vy += 0.2;
        return p.life > 0;
    });
    
    // Трейл
    if (player.alive) {
        player.trail.push({ x: player.x + cameraX, y: player.y + player.height/2, life: 1 });
        if (player.trail.length > 15) player.trail.shift();
        player.trail.forEach(t => t.life -= 0.07);
        player.trail = player.trail.filter(t => t.life > 0);
    }
}

function rectCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

function triangleCollision(px, py, pw, ph, tx, ty, tw, th) {
    // Упрощенная коллизия для треугольника (шипа)
    const cx = px + pw/2;
    const cy = py + ph/2;
    const tcx = tx + tw/2;
    const tcy = ty + th/2;
    const dist = Math.sqrt((cx-tcx)**2 + (cy-tcy)**2);
    return dist < (pw + tw) / 2.5;
}

function die() {
    if (!player.alive) return;
    player.alive = false;
    spawnParticles(player.x + cameraX, player.y + player.height/2, '#e94560', 20);
    gameState = 'gameover';
    finalScoreEl.textContent = scoreEl.textContent;
    gameOverScreen.classList.remove('hidden');
}

function win() {
    gameState = 'gameover';
    finalScoreEl.textContent = '100 (ПОБЕДА!)';
    gameOverScreen.classList.remove('hidden');
}

// === ОТРИСОВКА ===
function draw() {
    // Фон
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#0f0f23');
    gradient.addColorStop(1, '#1a1a3e');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Сетка фона
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = -cameraX % 50; i < canvas.width; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
    }
    for (let i = 0; i < canvas.height; i += 50) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
    }
    
    // Препятствия
    for (let obs of obstacles) {
        const type = obs[0];
        const ox = obs[1] - cameraX;
        const oy = obs[2];
        
        if (ox < -200 || ox > canvas.width + 200) continue;
        
        if (type === 'floor') {
            ctx.fillStyle = '#2d2d44';
            ctx.fillRect(ox, oy, obs[3], canvas.height - oy);
            // Полосы на полу
            ctx.fillStyle = '#e94560';
            ctx.fillRect(ox, oy, obs[3], 4);
        } else if (type === 'block') {
            const ow = obs[3];
            const oh = obs[4];
            ctx.fillStyle = '#3d3d5c';
            ctx.fillRect(ox, oy, ow, oh);
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.strokeRect(ox, oy, ow, oh);
            // Внутренний квадрат
            ctx.fillStyle = '#4d4d6e';
            ctx.fillRect(ox+5, oy+5, ow-10, oh-10);
        } else if (type === 'platform') {
            const ow = obs[3];
            ctx.fillStyle = '#2d8a4e';
            ctx.fillRect(ox, oy, ow, 10);
            ctx.fillStyle = '#3db868';
            ctx.fillRect(ox+2, oy+2, ow-4, 6);
        } else if (type === 'spike') {
            ctx.fillStyle = '#e94560';
            ctx.beginPath();
            ctx.moveTo(ox + 15, oy);
            ctx.lineTo(ox + 30, oy + 30);
            ctx.lineTo(ox, oy + 30);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#ff6b81';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else if (type === 'orb') {
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(ox, oy, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#88ffcc';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Пульсация
            const pulse = 1 + Math.sin(Date.now() / 200) * 0.2;
            ctx.strokeStyle = 'rgba(0,255,136,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ox, oy, 15 * pulse + 5, 0, Math.PI * 2);
            ctx.stroke();
        } else if (type === 'finish') {
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(ox, oy, 10, 100);
            ctx.fillRect(ox+30, oy, 10, 100);
            ctx.fillStyle = '#ffed4a';
            ctx.fillRect(ox+10, oy+10, 20, 5);
            ctx.fillRect(ox+10, oy+30, 20, 5);
            ctx.fillRect(ox+10, oy+50, 20, 5);
            ctx.fillRect(ox+10, oy+70, 20, 5);
        }
    }
    
    // Трейл
    player.trail.forEach((t, i) => {
        ctx.fillStyle = `rgba(233, 69, 96, ${t.life * 0.5})`;
        ctx.fillRect(t.x - cameraX - 3, t.y - 3, 6, 6);
    });
    
    // Игрок
    if (player.alive) {
        ctx.save();
        ctx.translate(player.x + player.width/2, player.y + player.height/2);
        ctx.rotate(player.rotation * Math.PI / 180);
        
        // Тело
        ctx.fillStyle = '#00d4ff';
        ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
        
        // Глаза
        ctx.fillStyle = '#fff';
        ctx.fillRect(-8, -8, 6, 6);
        ctx.fillRect(2, -8, 6, 6);
        ctx.fillStyle = '#000';
        ctx.fillRect(-6, -6, 3, 3);
        ctx.fillRect(4, -6, 3, 3);
        
        // Обводка
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(-player.width/2, -player.height/2, player.width, player.height);
        
        ctx.restore();
    }
    
    // Частицы
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x - cameraX - p.size/2, p.y - p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;
    
    // Прогресс-бар
    const progress = parseInt(scoreEl.textContent) / 100;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(canvas.width/2 - 150, 10, 300, 8);
    ctx.fillStyle = '#e94560';
    ctx.fillRect(canvas.width/2 - 150, 10, 300 * progress, 8);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(canvas.width/2 - 150, 10, 300, 8);
}

// === УПРАВЛЕНИЕ ===
function jump() {
    if (gameState === 'menu') {
        startGame();
    } else if (gameState === 'playing') {
        if (player.grounded) {
            player.vy = player.jumpForce;
            player.grounded = false;
            spawnParticles(player.x + cameraX, player.y + player.height, '#00d4ff', 5);
        }
    } else if (gameState === 'gameover') {
        restartGame();
    }
}

function startGame() {
    gameState = 'playing';
    menu.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    resetPlayer();
    generateLevel();
    attempts = 1;
    attemptsEl.textContent = attempts;
    scoreEl.textContent = '0';
}

function restartGame() {
    gameState = 'playing';
    gameOverScreen.classList.add('hidden');
    resetPlayer();
    cameraX = 0;
    attempts++;
    attemptsEl.textContent = attempts;
    scoreEl.textContent = '0';
    particles = [];
    player.trail = [];
}

function resetPlayer() {
    player.x = 150;
    player.y = floorY - player.height;
    player.vy = 0;
    player.rotation = 0;
    player.grounded = true;
    player.alive = true;
    player.trail = [];
}

// События
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        e.preventDefault();
        jump();
    }
});

canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    jump();
});

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    jump();
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', restartGame);

// === ГЛАВНЫЙ ЦИКЛ ===
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Инициализация
resetPlayer();
generateLevel();
gameLoop();
</script>
</body>
</html>
