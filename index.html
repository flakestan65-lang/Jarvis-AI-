<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Forge Core: Кузница Бесконечности</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0b0a10;
    --bg-void-2:#14111a;
    --bg-panel:#1b1620;
    --bg-panel-2:#221b28;
    --ember-hot:#ff6a2d;
    --ember-glow:#ffb347;
    --molten-core:#ff3b1f;
    --teal-auto:#2de8c8;
    --gold-prestige:#ffd166;
    --violet-ascend:#c084fc;
    --text-main:#f4ede4;
    --text-dim:#a89b93;
    --line:rgba(255,170,110,0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% -10%, #2a1a12 0%, var(--bg-void-2) 45%, var(--bg-void) 100%);
    font-family: 'Manrope', Arial, sans-serif;
    color: var(--text-main);
    overflow: hidden;
  }
  .num, #currency, .shop-buy-btn, .stat-capsule b, .tab-btn, .rebirth-stars, .profile-stat-row b {
    font-family: 'Rajdhani', 'Manrope', sans-serif;
  }
  .icon-svg { width: 1em; height: 1em; display: inline-block; vertical-align: -0.15em; }

  /* forge floor texture - simplified */
  #forge-floor {
    position: fixed; left:0; right:0; bottom:0; height: 45%;
    background: repeating-linear-gradient(0deg, rgba(255,120,50,0.04) 0px, transparent 20px);
    -webkit-mask-image: linear-gradient(to top, black, transparent);
    mask-image: linear-gradient(to top, black, transparent);
    pointer-events: none; z-index: 0;
  }

  /* ============ LOADING SCREEN ============ */
  #loading-screen {
    position: fixed; inset: 0; z-index: 999;
    background: radial-gradient(circle at 50% 40%, #2a1a12, #0b0a10 75%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px;
  }
  #loading-logo {
    font-family:'Rajdhani',sans-serif;
    font-size: 2.3em;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--ember-glow), var(--molten-core), var(--gold-prestige), var(--ember-glow));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: logoGlow 3s linear infinite;
    text-align: center;
  }
  @keyframes logoGlow { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
  #loading-bolt { font-size: 3.6em; color: var(--ember-hot); animation: boltPulse 1s ease-in-out infinite; filter: drop-shadow(0 0 20px var(--ember-hot)); }
  @keyframes boltPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  #loading-bar-track {
    width: 70%; max-width: 320px; height: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  #loading-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--molten-core), var(--ember-hot), var(--gold-prestige));
    border-radius: 10px;
    transition: width 0.1s linear;
  }
  #loading-pct { font-size: 0.9em; color: var(--ember-glow); font-weight: 700; }
  #loading-tip { font-size: 0.75em; color: var(--text-dim); text-align: center; padding: 0 30px; max-width: 320px; min-height: 30px; }

  #app { width: 100%; height: 100%; display: none; flex-direction: column; position: relative; z-index:1; }
  #app.visible { display: flex; }

  /* HEADER - simplified */
  #header { padding: 10px 15px 4px; text-align: center; z-index: 5; position:relative; }
  #currency {
    font-size: 2.1em; font-weight: 700;
    background: linear-gradient(90deg, var(--gold-prestige), var(--ember-glow));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter: drop-shadow(0 0 8px rgba(255,140,50,0.5));
    letter-spacing: 1px;
  }
  #stats-row {
    display: flex; justify-content: center; gap: 12px; margin-top: 3px;
    font-size: 0.78em; color: var(--text-dim); flex-wrap: wrap;
  }
  #stats-row span b { color: var(--ember-glow); font-weight:700; }
  #prestige-row { font-size: 0.75em; color: var(--gold-prestige); margin-top: 3px; }
  #prestige-row .icon-svg { margin-right: 3px; }
  #ascend-row { font-size: 0.72em; color: var(--violet-ascend); margin-top: 2px; display:none; }
  #ascend-row.show { display:block; }
  #ascend-row .icon-svg { margin-right: 3px; }

  /* CLICK AREA - simplified particles */
  #click-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }

  #ember-field { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:1; }
  .ember-particle {
    position:absolute; bottom:-10px; border-radius:50%;
    background: radial-gradient(circle, var(--ember-glow), var(--ember-hot));
    box-shadow: 0 0 6px var(--ember-hot);
    animation-name: riseEmber; animation-timing-function: ease-in; animation-iteration-count: infinite;
  }
  @keyframes riseEmber {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.9; }
    100% { transform: translateY(-105vh) translateX(var(--drift,20px)); opacity: 0; }
  }

  .orbit-ring {
    position:absolute; top:50%; left:50%;
    border:1px dashed var(--line); border-radius:50%;
    animation: spin linear infinite; z-index:2;
  }
  .orbit-ring .orbit-dot {
    position:absolute; top:-5px; left:50%; margin-left:-5px;
    width:10px; height:10px; border-radius:50%;
    box-shadow: 0 0 10px currentColor;
  }
  @keyframes spin { from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(360deg)} }

  .stat-capsule {
    position:absolute; z-index:4;
    background: rgba(27,22,32,0.75);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 6px 10px;
    font-size: 0.72em;
    color: var(--text-dim);
    display:flex; align-items:center; gap:6px;
    backdrop-filter: blur(3px);
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
  }
  .stat-capsule b { color: var(--text-main); font-size: 1.15em; font-weight:700; }
  .stat-capsule .icon-svg { font-size: 1.3em; }
  #cap-click { top: 10%; left: 6%; color: var(--molten-core); }
  #cap-dps { top: 10%; right: 6%; color: var(--teal-auto); }
  #cap-mult { bottom: 12%; left: 6%; color: var(--gold-prestige); }
  #cap-crit { bottom: 12%; right: 6%; color: var(--violet-ascend); }

  #click-btn-wrap { position:relative; z-index:5; display:flex; align-items:center; justify-content:center; }
  #click-btn {
    width: 50vw; height: 50vw; max-width: 270px; max-height: 270px;
    border: none; cursor: pointer;
    clip-path: polygon(50% 2%, 95% 26%, 95% 74%, 50% 98%, 5% 74%, 5% 26%);
    background: radial-gradient(circle at 38% 28%, #ffd48a, var(--ember-hot) 40%, var(--molten-core) 78%, #5c0f00 100%);
    box-shadow: 0 0 40px rgba(255,90,30,0.75), inset 0 -14px 34px rgba(0,0,0,0.4);
    position: relative;
    transition: transform 0.08s ease;
    display: flex; align-items: center; justify-content: center;
  }
  #click-btn:active { transform: scale(0.93); }
  #click-btn-icon .icon-svg { width: 15vw; height: 15vw; max-width: 84px; max-height: 84px; color: #fff8ee; filter: drop-shadow(0 0 10px #fff2d0); }

  .float-num {
    position: absolute; font-weight: 700; font-size: 1.3em; font-family:'Rajdhani',sans-serif;
    color: var(--ember-glow); text-shadow: 0 0 8px var(--ember-hot); pointer-events: none;
    animation: floatUp 0.9s ease-out forwards; z-index: 10;
  }
  .float-num.crit { color: var(--violet-ascend); text-shadow: 0 0 10px var(--violet-ascend); font-size: 1.6em; }
  @keyframes floatUp { 0%{transform:translate(-50%,0) scale(0.6);opacity:1} 100%{transform:translate(-50%,-110px) scale(1.3);opacity:0} }

  .particle {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    pointer-events: none; z-index: 9; animation: particleFly 0.6s ease-out forwards;
  }
  @keyframes particleFly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0.2);opacity:0} }

  /* BOTTOM NAV - simplified */
  #tabs {
    display: flex; gap: 4px; padding: 6px 6px; z-index: 5;
    overflow-x: auto; background: rgba(20,16,24,0.85);
    border-top: 1px solid var(--line);
    backdrop-filter: blur(6px);
  }
  .tab-btn {
    flex: 0 0 auto; min-width: 64px;
    padding: 8px 8px 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text-dim);
    font-size: 0.7em;
    font-weight: 600;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.25;
  }
  .tab-btn .tab-icon { display:block; margin-bottom: 2px; }
  .tab-btn .tab-icon .icon-svg { width: 1.5em; height: 1.5em; }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--molten-core), var(--ember-hot));
    color: #fff;
    box-shadow: 0 0 14px rgba(255,90,30,0.6);
    border-color: transparent;
  }

  /* PANELS - simplified */
  #panels {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(11, 10, 16, 0.98); z-index: 20;
    display: none; flex-direction: column; padding-top: 8px;
  }
  #panels.visible { display: flex; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 15px 8px; border-bottom: 1px solid var(--line);
  }
  .panel-header h2 { margin: 4px 0; font-size: 1.05em; color: var(--ember-glow); display:flex; align-items:center; gap:8px; font-family:'Rajdhani',sans-serif; font-weight:700; }
  #close-panel { background: rgba(255,255,255,0.08); border: none; color: #fff; font-size: 1.3em; width: 42px; height: 42px; border-radius: 50%; }
  #panel-content { flex: 1; overflow-y: auto; padding: 8px 10px 90px; }

  .section-label { text-align:center;color:var(--teal-auto);margin:12px 0 6px;font-size:0.78em;letter-spacing:0.5px; }

  .shop-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 13px; padding: 11px 12px; margin-bottom: 9px;
    display: flex; align-items: center; gap: 11px;
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .shop-item.affordable { border-color: rgba(255,140,50,0.6); box-shadow: 0 0 8px rgba(255,120,40,0.2); }
  .shop-item.bought-flash { animation: flashBuy 0.4s ease; }
  @keyframes flashBuy { 0%{background:rgba(255,140,50,0.35)} 100%{background:rgba(255,255,255,0.03)} }
  .shop-icon { font-size: 2.1em; width: 48px; text-align: center; color: var(--ember-glow); filter: drop-shadow(0 0 6px currentColor); }
  .shop-info { flex: 1; min-width:0; }
  .shop-title { font-weight: 700; font-size: 0.92em; color: #fff; }
  .shop-desc { font-size: 0.7em; color: var(--text-dim); margin-top: 2px; }
  .shop-buy-btn {
    padding: 12px 13px; border-radius: 11px; border: none;
    font-weight: 700; font-size: 0.95em;
    background: linear-gradient(135deg, var(--ember-hot), var(--molten-core));
    color: #1b0800; min-width: 82px; text-align: center;
  }
  .shop-buy-btn.disabled { background: rgba(255,255,255,0.06); color: #665f5b; }

  /* PROFILE */
  #profile-content { padding: 6px 4px; }
  .profile-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 14px; padding: 14px; margin-bottom: 12px;
  }
  .profile-stat-row { display:flex; justify-content:space-between; padding: 6px 0; font-size:0.85em; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .profile-stat-row b { color: var(--ember-glow); font-weight:700; }
  .settings-btn {
    width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04); color: #fff; font-size: 0.95em;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  #reset-btn { background: linear-gradient(135deg, #ff3b3b, #8a0038); border: none; font-weight: 700; }

  /* FAQ */
  .faq-item { background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 8px; overflow:hidden; }
  .faq-q { padding: 12px 13px; font-weight:700; font-size:0.87em; color:var(--ember-glow); cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .faq-a { padding: 0 13px; max-height:0; overflow:hidden; transition: max-height 0.25s ease, padding 0.25s ease; font-size:0.8em; color:#cbbdb5; line-height:1.5; }
  .faq-a.open { padding: 0 13px 13px; max-height: 500px; }
  .faq-arrow { transition: transform 0.2s; }
  .faq-arrow.open { transform: rotate(180deg); }

  /* REBIRTH / ASCENSION */
  .rebirth-box { text-align:center; padding: 14px 10px; }
  .rebirth-icon-big { color:var(--gold-prestige); filter: drop-shadow(0 0 15px var(--gold-prestige)); }
  .rebirth-icon-big.ascend { color: var(--violet-ascend); filter: drop-shadow(0 0 15px var(--violet-ascend)); }
  .rebirth-icon-big .icon-svg { width: 2.4em; height: 2.4em; }
  .rebirth-stars { font-size: 2em; color:var(--gold-prestige); text-shadow: 0 0 15px var(--gold-prestige); margin: 6px 0; display:flex; align-items:center; justify-content:center; gap:8px; }
  .rebirth-stars.ascend { color: var(--violet-ascend); text-shadow: 0 0 15px var(--violet-ascend); }
  .rebirth-btn {
    margin-top: 14px; padding: 15px 26px; border-radius: 14px; border:none;
    background: linear-gradient(135deg, var(--gold-prestige), var(--ember-hot));
    color:#200; font-weight:800; font-size: 1em;
    box-shadow: 0 0 20px rgba(255,180,50,0.6);
  }
  .rebirth-btn.ascend { background: linear-gradient(135deg, var(--violet-ascend), #6b2fd8); color:#fff; box-shadow: 0 0 20px rgba(180,80,255,0.6); }
  .rebirth-btn.disabled { background: rgba(255,255,255,0.06); color:#665f5b; box-shadow:none; }
  .rebirth-info { font-size:0.74em; color:var(--text-dim); margin-top:10px; line-height:1.6; }

  #boost-banner {
    position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--gold-prestige), var(--ember-hot)); color: #200;
    font-weight: 800; font-size: 0.78em; padding: 5px 14px; border-radius: 20px;
    box-shadow: 0 0 15px rgba(255,150,0,0.8); z-index: 6; display: none;
    align-items: center; gap: 5px;
  }

  #toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); border: 1px solid var(--line);
    color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 0.8em;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    max-width: 85%; text-align: center;
  }
  #toast.show { opacity: 1; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,140,50,0.35); border-radius: 3px; }
</style>
</head>
<body>

<div id="forge-floor"></div>

<div id="loading-screen">
  <div id="loading-bolt"></div>
  <div id="loading-logo">FORGE CORE</div>
  <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
  <div id="loading-pct">0%</div>
  <div id="loading-tip">Загрузка...</div>
</div>

<div id="app">

  <div id="header">
    <div id="currency">0</div>
    <div id="stats-row">
      <span>Клик: <b id="stat-click">1</b></span>
      <span>Сек: <b id="stat-dps">0</b></span>
      <span>Всего: <b id="stat-total">0</b></span>
    </div>
    <div id="prestige-row">Звёзды перерождения: <b id="stat-stars">0</b> (x<span id="stat-prestige-mult">1</span> ко всему)</div>
    <div id="ascend-row">Кристаллы вознесения: <b id="stat-crystals">0</b> • Вознесений: <b id="stat-ascend-count">0</b></div>
  </div>

  <div id="tabs">
    <div class="tab-btn" data-panel="damage"><span class="tab-icon"></span>Урон</div>
    <div class="tab-btn" data-panel="auto"><span class="tab-icon"></span>Авто</div>
    <div class="tab-btn" data-panel="farms"><span class="tab-icon"></span>Фермы</div>
    <div class="tab-btn" data-panel="boosts"><span class="tab-icon"></span>Бусты</div>
    <div class="tab-btn" data-panel="relics"><span class="tab-icon"></span>Реликвии</div>
    <div class="tab-btn" data-panel="rebirth"><span class="tab-icon"></span>Реб.</div>
    <div class="tab-btn" data-panel="ascension"><span class="tab-icon"></span>Вознес.</div>
    <div class="tab-btn" data-panel="achievements"><span class="tab-icon"></span>Дост.</div>
    <div class="tab-btn" data-panel="profile"><span class="tab-icon"></span>Проф.</div>
  </div>

  <div id="click-area">
    <div id="ember-field"></div>
    <div class="orbit-ring" id="ring1" style="color:var(--ember-hot)"><div class="orbit-dot" style="background:var(--ember-hot)"></div></div>
    <div class="orbit-ring" id="ring2" style="color:var(--teal-auto)"><div class="orbit-dot" style="background:var(--teal-auto)"></div></div>
    <div class="orbit-ring" id="ring3" style="color:var(--gold-prestige)"><div class="orbit-dot" style="background:var(--gold-prestige)"></div></div>

    <div class="stat-capsule" id="cap-click"></div>
    <div class="stat-capsule" id="cap-dps"></div>
    <div class="stat-capsule" id="cap-mult"></div>
    <div class="stat-capsule" id="cap-crit"></div>

    <div id="boost-banner"></div>
    <div id="click-btn-wrap">
      <button id="click-btn"><span id="click-btn-icon"></span></button>
    </div>
  </div>

  <div id="panels">
    <div class="panel-header">
      <h2 id="panel-title">Магазин</h2>
      <button id="close-panel">&#10005;</button>
    </div>
    <div id="panel-content"></div>
  </div>

</div>
<div id="toast"></div>

<script>
(function(){
  "use strict";

  /* ================= ICONS ================= */
  var ICON_PATHS = {
    bolt: '<path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/>',
    sword: '<path d="M6.5 17.5 17 7M14 4l6 6-3 1-4-4 1-3zM3 21l3.5-3.5M5 19l2 2"/>',
    glove: '<path d="M7 10V6a2 2 0 1 1 4 0v3M11 9V5a2 2 0 1 1 4 0v4M15 9V6a2 2 0 1 1 4 0v6c0 4-3 7-7 7s-7-2-7-6v-3a2 2 0 1 1 4 0v1"/>',
    flame: '<path d="M12 2c1 4-4 5-4 9a4 4 0 0 0 8 0c0-2-1-3-1-3s2 1 2 5a6 6 0 1 1-12 0c0-6 5-6 7-11z"/>',
    snow: '<path d="M12 2v20M4.5 6l15 12M19.5 6l-15 12M4 12h16M7 4l2 2M17 4l-2 2M7 20l2-2M17 20l-2-2"/>',
    hammer: '<path d="M14 6l4 4-8 8-4-4 8-8zM3 21l6-6M17 3l4 4-2 2-4-4 2-2z"/>',
    dagger: '<path d="M12 2v13M8 6h8M9 15l3 3 3-3M12 18v4"/>',
    robot: '<rect x="5" y="8" width="14" height="10" rx="2"/><circle cx="9" cy="13" r="1.2"/><circle cx="15" cy="13" r="1.2"/><path d="M12 8V4M9 4h6M4 12H2M22 12h-2"/>',
    arm: '<path d="M4 14l4-4 3 3 5-5 4 4M8 20l4-4 4 4"/>',
    brain: '<path d="M9 3a3 3 0 0 0-3 3 3 3 0 0 0-2 5 3 3 0 0 0 2 5 3 3 0 0 0 3 3M15 3a3 3 0 0 1 3 3 3 3 0 0 1 2 5 3 3 0 0 1-2 5 3 3 0 0 1-3 3M9 3v18M15 3v18"/>',
    chip: '<rect x="7" y="7" width="10" height="10" rx="1"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/>',
    house: '<path d="M4 11l8-7 8 7v9a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1v-9z"/>',
    cup: '<path d="M6 3h12l-1 12a5 5 0 0 1-10 0L6 3zM9 3v2M15 3v2M4 21h16"/>',

  /* ================= SAVE / LOAD ================= */

  function save() {
    state.lastSeen = Date.now();
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function todayStr(){
    const d = new Date();
    return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
  }

  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const loaded = JSON.parse(raw);
        state = Object.assign(JSON.parse(JSON.stringify(defaultState)), loaded);
        // ensure all fields
        state.multipliersBought = Object.assign({m2:0,m5:0,m10:0,m25:0,m50:0,m100:0,m500:0,m1000:0,m10000:0}, loaded.multipliersBought || {});
        state.specials = Object.assign({battery:0, accel:0, overclock:0, crit:0, offline:0}, loaded.specials || {});
        state.relics = loaded.relics || {};
        state.farms = loaded.farms || {};
        state.achievements = loaded.achievements || {};
        state.starShopBought = loaded.starShopBought || {};

        // offline
        const capSec = 3600*4 + state.specials.offline*3600;
        const elapsedSec = Math.floor((Date.now() - (state.lastSeen||Date.now()))/1000);
        const offlineSec = Math.min(capSec, elapsedSec);
        if (offlineSec > 5) {
          const offlineMult = 1 + state.specials.offline*0.15 + relicOfflineBonus();
          const earned = Math.floor(offlineSec * getEffectiveDps() * offlineMult);
          if (earned > 0) {
            state.currency += earned;
            state.totalEarned += earned;
            setTimeout(()=> showToast(`Пока вас не было: +${formatNum(earned)}!`), 900);
          }
        }

        const today = todayStr();
        if (state.lastLoginDay !== today) {
          const oneDayMs = 86400000;
          const last = state.lastLoginDay ? new Date(state.lastLoginDay.split("-")[0], state.lastLoginDay.split("-")[1]-1, state.lastLoginDay.split("-")[2]) : null;
          const now = new Date();
          const diffDays = last ? Math.round((now.setHours(0,0,0,0) - new Date(last.getFullYear(),last.getMonth(),last.getDate()).getTime())/oneDayMs) : null;
          if (diffDays === 1) { state.loginStreak++; }
          else { state.loginStreak = 1; }
          state.lastLoginDay = today;
          const streakCapped = Math.min(state.loginStreak, 30);
          const bonus = Math.max(100, Math.floor(state.totalEarned*0.02*streakCapped));
          state.currency += bonus;
          state.totalEarned += bonus;
          setTimeout(()=> showToast(`День ${state.loginStreak} подряд! Бонус: +${formatNum(bonus)}`), 1700);
        }
      } else {
        state.lastLoginDay = todayStr();
        state.loginStreak = 1;
      }
    } catch(e) {}
  }

  /* ================= HELPERS ================= */

  function formatNum(n) {
    if (n < 1000) return (Math.floor(n*100)/100).toString();
    const units = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "UDc", "DDc", "TDc", "QaDc", "QiDc", "SxDc", "SpDc", "OcDc"];
    let u = 0;
    let val = n;
    while (val >= 1000 && u < units.length-1) { val /= 1000; u++; }
    return val.toFixed(val < 10 ? 2 : val < 100 ? 1 : 0) + units[u];
  }

  function batteryBonus() { return 1 + state.specials.battery * 0.2; }
  function overclockBonus() { return 1 + state.specials.overclock * 0.08; }
  function prestigeMult() { 
    let extra = 0;
    if (state.starShopBought && state.starShopBought.ss3) extra = 0.5;
    return 1 + state.prestigeStars * 0.1 + extra; 
  }
  function achievementMult() {
    let bonus = 0;
    achievementsData.forEach(a => { if (state.achievements[a.id]) bonus += a.bonus; });
    return 1 + bonus;
  }

  function relicBonusAll(){ return 1 + (state.relics.r7 ? 1.0 : 0); }
  function relicClickMult(){ return 1 + (state.relics.r9 ? 2.0 : 0); }
  function relicDpsMult(){ return 1 + (state.relics.r3 ? 0.5 : 0) + (state.relics.r10 ? 2.0 : 0); }
  function relicFarmMult(){ return 1 + (state.relics.r2 ? 0.5 : 0); }
  function relicCritBonus(){ return state.relics.r4 ? 0.10 : 0; }
  function relicOfflineBonus(){ return state.relics.r5 ? 0.5 : 0; }
  function relicCrystalGainBonus(){ return state.relics.r8 ? 0.5 : 0; }
  function relicStarGainBonus(){ return state.relics.r6 ? 0.25 : 0; }

  function flatClickBonus() {
    let sum = 0;
    clickTierUpgrades.forEach(u => { if (state[u.id]) sum += u.powerAdd; });
    return sum;
  }
  function flatAutoBonus() {
    let sum = 0;
    autoTierUpgrades.forEach(u => { if (state[u.id]) sum += u.dpsAdd; });
    return sum;
  }
  function farmsIncome() {
    let sum = 0;
    farms.forEach(f => { sum += (state.farms[f.key]||0) * f.income; });
    return sum * relicFarmMult();
  }
  function totalFarmsOwned() {
    let sum = 0;
    farms.forEach(f => { sum += (state.farms[f.key]||0); });
    return sum;
  }

  function globalMult() {
    return state.multiplier * batteryBonus() * overclockBonus() * prestigeMult() * achievementMult() * relicBonusAll();
  }

  function getEffectiveClickPower() {
    const base = state.clickPower + flatClickBonus();
    const mult = globalMult();
    const boosted = state.boostEndTime > Date.now() ? state.boostMultiplier : 1;
    return base * mult * boosted * relicClickMult();
  }

  function getEffectiveDps() {
    const base = state.autoPerSec + flatAutoBonus() + farmsIncome();
    const mult = globalMult();
    const boosted = state.boostEndTime > Date.now() ? state.boostMultiplier : 1;
    return base * mult * boosted * relicDpsMult();
  }

  function getCritChance(){
    return Math.min(0.9, state.specials.crit*0.03 + relicCritBonus());
  }

  function applyRelicStartBonuses(){
    if (state.relics.r1) state.clickPower += 10;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(()=> t.classList.remove("show"), 2200);
  }

  /* ================= ACHIEVEMENTS ================= */

  function computeAchievementContext() {
    return {
      totalFarms: totalFarmsOwned(),
      dps: getEffectiveDps(),
      allClick: clickTierUpgrades.every(u => !!state[u.id]),
      allAuto: autoTierUpgrades.every(u => !!state[u.id]),
      allMulti: multiUpgrades.every(u => state.multipliersBought[u.key] >= u.maxLevel),
      relicCount: relicsData.filter(r => state.relics[r.id]).length,
      allRelics: relicsData.every(r => state.relics[r.id])
    };
  }

  function checkAchievements() {
    const ctx = computeAchievementContext();
    let unlockedNew = false;
    achievementsData.forEach(a => {
      if (!state.achievements[a.id] && a.check(state, ctx)) {
        state.achievements[a.id] = true;
        unlockedNew = true;
        showToast(`Достижение: ${a.name}`);
      }
    });
    if (unlockedNew) {
      save();
      if (currentPanel === "achievements") renderPanel("achievements");
      renderStats();
    }
  }

  function buildShopItem({icon, title, desc, cost, onBuy, maxed, locked}) {
    const div = document.createElement("div");
    const affordable = !maxed && !locked && cost !== null && state.currency >= cost;
    div.className = "shop-item" + (affordable ? " affordable" : "");
    if (locked) div.style.opacity = "0.5";
    div.innerHTML = `
      <div class="shop-icon">${iconHtml(icon)}</div>
      <div class="shop-info">
        <div class="shop-title">${title}</div>
        <div class="shop-desc">${desc}</div>
      </div>
      <div class="shop-buy-btn ${affordable ? "" : "disabled"}">${maxed ? "МАКС" : locked ? iconHtml("lock") : formatNum(cost)}</div>
    `;
    if (!maxed && !locked) {
      div.addEventListener("click", () => {
        if (state.currency >= cost) {
          onBuy(cost);
          div.classList.add("bought-flash");
          save();
          checkAchievements();
          if (currentPanel) renderPanel(currentPanel);
          renderStats();
        } else {
          showToast("Недостаточно валюты!");
        }
      });
    } else if (locked) {
      div.addEventListener("click", () => showToast("Сначала откройте требуемый уровень!"));
    }
    return div;
  }

  function buildRelicItem(r) {
    const bought = !!state.relics[r.id];
    const affordable = !bought && state.ascensionCrystals >= r.cost;
    const div = document.createElement("div");
    div.className = "shop-item" + (affordable ? " affordable" : "");
    div.innerHTML = `
      <div class="shop-icon">${iconHtml(r.icon)}</div>
      <div class="shop-info">
        <div class="shop-title">${r.name}</div>
        <div class="shop-desc">${r.desc}</div>
      </div>
      <div class="shop-buy-btn ${affordable ? "" : "disabled"}">${bought ? iconHtml("check") : (iconHtml("gem") + " " + r.cost)}</div>
    `;
    if (!bought) {
      div.addEventListener("click", () => {
        if (state.ascensionCrystals >= r.cost) {
          state.ascensionCrystals -= r.cost;
          state.relics[r.id] = true;
          div.classList.add("bought-flash");
          save();
          checkAchievements();
          if (currentPanel === "relics") renderPanel("relics");
          renderStats();
          showToast(`Реликвия получена: ${r.name}`);
        } else {
          showToast("Недостаточно кристаллов вознесения!");
        }
      });
    }
    return div;
  }

        icon: clickUpgrade.icon, title: clickUpgrade.name, desc: clickUpgrade.desc(state.clickLevel),
        cost: costFor(clickUpgrade.baseCost, clickUpgrade.growth, state.clickLevel),
        onBuy: (cost) => { state.currency -= cost; state.clickLevel++; state.clickPower *= clickUpgrade.powerMult; }
      }));
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = "— Мощные улучшения (разовые) —";
      panelContent.appendChild(label);
      clickTierUpgrades.forEach(u => {
        const bought = !!state[u.id];
        const locked = !bought && state.clickLevel < u.req;
        panelContent.appendChild(buildShopItem({
          icon: u.icon, title: u.name,
          desc: locked ? `Требуется уровень удара ${u.req} (сейчас ${state.clickLevel})` : u.desc,
          cost: u.cost, maxed: bought, locked,
          onBuy: (cost) => { state.currency -= cost; state[u.id] = true; }
        }));
      });
    }

    else if (kind === "auto") {
      // similar for auto...
      panelTitle.innerHTML = iconHtml("robot") + " Автоклики";
      panelContent.appendChild(buildShopItem({
        icon: autoUpgrade.icon, title: autoUpgrade.name, desc: autoUpgrade.desc(state.autoLevel),
        cost: costFor(autoUpgrade.baseCost, autoUpgrade.growth, state.autoLevel),
        onBuy: (cost) => { state.currency -= cost; state.autoLevel++; state.autoPerSec += autoUpgrade.gain; }
      }));
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = "— Мощные улучшения (разовые) —";
      panelContent.appendChild(label);
      autoTierUpgrades.forEach(u => {
        const bought = !!state[u.id];
        const locked = !bought && state.autoLevel < u.req;
        panelContent.appendChild(buildShopItem({
          icon: u.icon, title: u.name,
          desc: locked ? `Требуется уровень авто ${u.req} (сейчас ${state.autoLevel})` : u.desc,
          cost: u.cost, maxed: bought, locked,
          onBuy: (cost) => { state.currency -= cost; state[u.id] = true; }
        }));
      });
    }

    else if (kind === "farms") {
      panelTitle.innerHTML = iconHtml("house") + " Фермы";
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = "Покупайте фермы для пассивного дохода (цены повышены)";
      panelContent.appendChild(label);
      farms.forEach(f => {
        const count = state.farms[f.key] || 0;
        const cost = costFor(f.baseCost, f.growth, count);
        panelContent.appendChild(buildShopItem({
          icon: f.icon, title: `${f.name} (x${count})`,
          desc: `${f.desc} • +${formatNum(f.income)}/сек`,
          cost,
          onBuy: (c) => { state.currency -= c; state.farms[f.key] = count + 1; }
        }));
      });
    }

    else if (kind === "boosts") {
      panelTitle.innerHTML = iconHtml("sparkles") + " Бонусные множители";
      multiUpgrades.forEach(u => {
        const lvl = state.multipliersBought[u.key];
        const maxed = lvl >= u.maxLevel;
        panelContent.appendChild(buildShopItem({
          icon: u.icon, title: u.name,
          desc: maxed ? "Куплено" : `x${u.factor} навсегда`,
          cost: maxed ? null : u.baseCost, maxed,
          onBuy: (cost) => { state.currency -= cost; state.multipliersBought[u.key] = 1; state.multiplier *= u.factor; }
        }));
      });
      const divider = document.createElement("div");
      divider.className = "section-label";
      divider.textContent = "— Специальные умения —";
      panelContent.appendChild(divider);
      specialUpgrades.forEach(u => {
        const lvl = state.specials[u.key];
        const maxed = lvl >= u.maxLevel;
        panelContent.appendChild(buildShopItem({
          icon: u.icon, title: u.name, desc: u.desc(lvl),
          cost: maxed ? null : costFor(u.baseCost, u.growth, lvl), maxed,
          onBuy: (cost) => { state.currency -= cost; state.specials[u.key]++; }
        }));
      });
    }

    else if (kind === "relics") {
      panelTitle.innerHTML = iconHtml("gem") + " Реликвии";
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = `Кристаллы: ${state.ascensionCrystals}. Также доступен Звёздный магазин.`;
      panelContent.appendChild(label);
      relicsData.forEach(r => panelContent.appendChild(buildRelicItem(r)));
    }

    else if (kind === "rebirth") {
      panelTitle.innerHTML = iconHtml("refresh") + " Перерождение";
      const potentialStars = Math.floor(Math.sqrt(state.totalEarned / 100000000) * (1 + relicStarGainBonus()));
      const box = document.createElement("div");
      box.className = "rebirth-box";
      box.innerHTML = `
        <div class="rebirth-icon-big">${iconHtml("refresh")}</div>
        <div style="font-size:0.85em;color:var(--text-dim);margin-top:6px;">Текущие звёзды</div>
        <div class="rebirth-stars">${iconHtml("star")} ${state.prestigeStars}</div>
        <div style="font-size:0.8em;color:var(--text-dim);">x${prestigeMult().toFixed(1)} ко всему</div>
        <div style="margin-top:14px;font-size:0.85em;color:var(--text-dim);">Получите:</div>
        <div class="rebirth-stars" style="font-size:1.6em;">+${potentialStars} ${iconHtml("star")}</div>
        <button class="rebirth-btn ${potentialStars < 1 ? 'disabled' : ''}" id="do-rebirth">Переродиться</button>
        <div class="rebirth-info">
          Сброс прогресса за звёзды. Звёзды можно тратить в Звёздном магазине (доступно после первого перерождения).
        </div>
      `;
      panelContent.appendChild(box);
      document.getElementById("do-rebirth").addEventListener("click", () => {
        if (potentialStars < 1) { showToast("Заработайте больше!"); return; }
        if (confirm(`Получить +${potentialStars} звёзд?`)) {
          const newStars = state.prestigeStars + potentialStars;
          const keep = keepMetaProgress();
          state = JSON.parse(JSON.stringify(defaultState));
          restoreMetaProgress(keep);
          state.prestigeStars = newStars;
          applyRelicStartBonuses();
          save();
          renderPanel("rebirth");
          renderStats();
          showToast(`+${newStars} звёзд!`);
        }
      });
    }

    else if (kind === "ascension") {
      // similar, with crystals
      panelTitle.innerHTML = iconHtml("portal") + " Вознесение";
      const ASCEND_REQ = 40;
      const crystalsGain = Math.floor(state.prestigeStars/10 * (1+relicCrystalGainBonus()));
      const locked = state.prestigeStars < ASCEND_REQ;
      const box = document.createElement("div");
      box.className = "rebirth-box";
      box.innerHTML = `
        <div class="rebirth-icon-big ascend">${iconHtml("portal")}</div>
        <div style="font-size:0.85em;color:var(--text-dim);margin-top:6px;">Кристаллы</div>
        <div class="rebirth-stars ascend">${iconHtml("gem")} ${state.ascensionCrystals}</div>
        <button class="rebirth-btn ascend ${locked || crystalsGain < 1 ? 'disabled' : ''}" id="do-ascend">Вознестись</button>
        <div class="rebirth-info">
          Получите кристаллы для реликвий и Звёздного магазина.
        </div>
      `;
      panelContent.appendChild(box);
      // ... (add listener similar to original)
      const btn = document.getElementById("do-ascend");
      if (!locked) {
        btn.addEventListener("click", () => {
          if (crystalsGain < 1) return;
          if (confirm(`Получить +${crystalsGain} кристаллов?`)) {
            const gained = crystalsGain;
            const keep = keepMetaProgress();
            state = JSON.parse(JSON.stringify(defaultState));
            restoreMetaProgress(keep);
            state.ascensionCrystals = (keep.ascensionCrystals || 0) + gained;
            state.ascensionCount = (keep.ascensionCount || 0) + 1;
            applyRelicStartBonuses();
            save();
            renderPanel("ascension");
            renderStats();
          }
        });
      }
    }

    else if (kind === "achievements") {
      // unchanged
      panelTitle.innerHTML = iconHtml("trophy") + " Достижения";
      const unlockedCount = achievementsData.filter(a => state.achievements[a.id]).length;
      const summary = document.createElement("div");
      summary.className = "section-label";
      summary.textContent = `Открыто ${unlockedCount}/${achievementsData.length}`;
      panelContent.appendChild(summary);
      achievementsData.forEach(a => {
        const unlocked = !!state.achievements[a.id];
        const div = document.createElement("div");
        div.className = "shop-item" + (unlocked ? " affordable" : "");
        div.innerHTML = `
          <div class="shop-icon">${iconHtml(unlocked ? a.icon : "lock")}</div>
          <div class="shop-info">
            <div class="shop-title">${a.name}</div>
            <div class="shop-desc">${a.desc} • +${Math.round(a.bonus*100)}%</div>
          </div>
          <div class="shop-buy-btn ${unlocked ? "" : "disabled"}">${unlocked ? iconHtml("check") : iconHtml("lock")}</div>
        `;
        panelContent.appendChild(div);
      });
    }

    else if (kind === "profile") {
      panelTitle.innerHTML = iconHtml("user") + " Профиль";
      const wrap = document.createElement("div");
      wrap.id = "profile-content";
      const playedSince = new Date(state.createdAt).toLocaleDateString('ru-RU');
      wrap.innerHTML = `
        <div class="profile-card">
          <div class="profile-stat-row"><span>Валюта</span><b>${formatNum(state.currency)}</b></div>
          <div class="profile-stat-row"><span>Всего заработано</span><b>${formatNum(state.totalEarned)}</b></div>
          <div class="profile-stat-row"><span>Звёзды</span><b>${state.prestigeStars}</b></div>
          <div class="profile-stat-row"><span>Кристаллы</span><b>${state.ascensionCrystals}</b></div>
          <div class="profile-stat-row"><span>Достижения</span><b>${achievementsData.filter(a=>state.achievements[a.id]).length}/${achievementsData.length}</b></div>
        </div>
        <button class="settings-btn" id="faq-btn">${iconHtml("question")} FAQ</button>
        <button class="settings-btn" id="hardsave-btn">${iconHtml("save")} Сохранить</button>
        <button class="settings-btn" id="reset-btn">${iconHtml("trash")} Сбросить игру</button>
      `;
      panelContent.appendChild(wrap);
      wrap.querySelector("#hardsave-btn").addEventListener("click", () => { save(); showToast("Сохранено!"); });
      wrap.querySelector("#reset-btn").addEventListener("click", () => {
        if (confirm("Сбросить ВЕСЬ прогресс?")) {
          localStorage.removeItem(SAVE_KEY);
          location.reload();
        }
      });
      wrap.querySelector("#faq-btn").addEventListener("click", () => {
        currentPanel = "faq";
        renderPanel("faq");
      });
    }

    else if (kind === "faq") {
      // ... (same as original with updated FAQ)
      panelTitle.innerHTML = iconHtml("question") + " FAQ";
      const backBtn = document.createElement("button");
      backBtn.className = "settings-btn";
      backBtn.textContent = "← Назад";
      backBtn.addEventListener("click", () => { currentPanel = "profile"; renderPanel("profile"); });
      panelContent.appendChild(backBtn);
      faqData.forEach((item) => {
        const div = document.createElement("div");
        div.className = "faq-item";
        div.innerHTML = `
          <div class="faq-q">${item.q}<span class="faq-arrow">▾</span></div>
          <div class="faq-a">${item.a}</div>
        `;
        const q = div.querySelector(".faq-q");
        const a = div.querySelector(".faq-a");
        const arrow = div.querySelector(".faq-arrow");
        q.addEventListener("click", () => {
          const isOpen = a.classList.contains("open");
          a.classList.toggle("open", !isOpen);
          arrow.classList.toggle("open", !isOpen);
        });
        panelContent.appendChild(div);
      });
    }
  }

  /* META PROGRESS */
  function keepMetaProgress(){
    return {
      achievements: state.achievements,
      relics: state.relics,
      ascensionCrystals: state.ascensionCrystals,
      ascensionCount: state.ascensionCount,
      totalCrits: state.totalCrits,
      totalBoosts: state.totalBoosts,
      loginStreak: state.loginStreak,
      lastLoginDay: state.lastLoginDay,
      createdAt: state.createdAt,
      starShopBought: state.starShopBought
    };
  }
  function restoreMetaProgress(keep){
    Object.assign(state, keep);
  }

  /* CLICK LOGIC */
  function spawnFloatNumber(x, y, amount, isCrit) {
    const el = document.createElement("div");
    el.className = "float-num" + (isCrit ? " crit" : "");
    el.textContent = (isCrit ? "КРИТ! +" : "+") + formatNum(amount);
    el.style.left = x + "px";
    el.style.top = y + "px";
    clickArea.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }

  function spawnParticles(x, y, isCrit) {
    const colors = isCrit ? ["#c084fc", "#ff3b1f", "#ffd166"] : ["#ff6a2d", "#ffb347", "#ff3b1f"];
    const count = isCrit ? 12 : 8;
    for (let i = 0; i < count; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      const angle = Math.random() * Math.PI * 2;
      const dist = 35 + Math.random() * 45;
      p.style.setProperty("--dx", Math.cos(angle) * dist + "px");
      p.style.setProperty("--dy", Math.sin(angle) * dist + "px");
      p.style.left = x + "px";
      p.style.top = y + "px";
      p.style.background = colors[i % colors.length];
      clickArea.appendChild(p);
      setTimeout(() => p.remove(), 650);
    }
  }

  function handleClick(clientX, clientY) {
    const rect = clickArea.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    let gain = getEffectiveClickPower();
    let isCrit = false;
    const critChance = getCritChance();
    if (critChance > 0 && Math.random() < critChance) {
      gain *= 10;
      isCrit = true;
      state.totalCrits++;
    }

    state.currency += gain;
    state.totalEarned += gain;
    state.totalClicks++;

    spawnFloatNumber(x, y - 20, gain, isCrit);
    spawnParticles(x, y, isCrit);

    if (state.specials.accel > 0) {
      const chance = state.specials.accel * 0.03;
      if (Math.random() < chance) {
        state.boostEndTime = Date.now() + 10000;
        state.boostMultiplier = 3;
        state.totalBoosts++;
        showToast("x3 буст активирован!");
      }
    }

    clickBtn.style.transform = "scale(0.9)";
    setTimeout(() => clickBtn.style.transform = "", 90);

    renderStats();
    checkAchievements();
  }

  /* TABS */
  function initGame() {
    load();
    applyRelicStartBonuses();
    renderStats();

    clickBtn.addEventListener("click", (e) => { handleClick(e.clientX, e.clientY); });
    clickBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const touch = e.changedTouches[0];
      handleClick(touch.clientX, touch.clientY);
    }, {passive:false});

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentPanel = btn.dataset.panel;
        renderPanel(currentPanel);
        panels.classList.add("visible");
      });
    });

    document.getElementById("close-panel").addEventListener("click", () => {
      panels.classList.remove("visible");
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      currentPanel = null;
    });

    let lastTick = Date.now();
    let panelRefreshAccum = 0;
    function gameLoop() {
      const now = Date.now();
      const dt = (now - lastTick) / 1000;
      lastTick = now;

      const dps = getEffectiveDps();
      if (dps > 0) {
        const gained = dps * dt;
        state.currency += gained;
        state.totalEarned += gained;
      }

      renderStats();

      panelRefreshAccum += dt;
      if (panelRefreshAccum > 0.5) {
        panelRefreshAccum = 0;
        checkAchievements();
        if (currentPanel && panels.classList.contains("visible") && AUTO_REFRESH_PANELS.indexOf(currentPanel) !== -1) {
          renderPanel(currentPanel);
        }
      }

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    setInterval(save, 1000);
    window.addEventListener("beforeunload", save);
  }

})();
</script>
</body>
</html>
